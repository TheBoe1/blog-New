name: Deploy to OSS + ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install ossutil
        run: |
          curl -fsSL -o /tmp/ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64.zip
          unzip -q /tmp/ossutil.zip -d /tmp/ossutil
          chmod +x /tmp/ossutil/ossutil64
          sudo mv /tmp/ossutil/ossutil64 /usr/local/bin/ossutil

      - name: Configure ossutil
        run: |
          ossutil config \
            --access-key-id "$OSS_KEY_ID" \
            --access-key-secret "$OSS_KEY_SECRET" \
            --endpoint oss-cn-beijing.aliyuncs.com
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}

      - name: Clean OSS remote prefix
        run: ossutil rm -rf oss://theboe/main/

      - name: Upload dist to OSS
        run: |
          ossutil cp -rf --update dist/ oss://theboe/main/ \
            --include "*" \
            --metadata "Cache-Control:max-age=31536000,immutable"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync index.html to ECS
        run: |
          scp -i ~/.ssh/id_ed25519 dist/index.html "$SSH_USER@$SSH_HOST:/root/nginx/html/main/index.html"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
