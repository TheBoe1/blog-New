name: Deploy to OSS + ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install ossutil
        run: |
          set -eux
          # 尝试多个已知 Linux 二进制地址（阿里云官方文档公布的稳定路径）
          for URL in \
            "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64" \
            "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64" \
            "https://gosspublic.alicdn.com/ossutil/1.7.17/ossutil64"; do
            echo "Trying $URL"
            if curl -fsSL -o /tmp/ossutilbin "$URL"; then
              echo "OK from: $URL"
              break
            fi
          done

          # 如果直接二进制都失败，回退到 zip（可能是 Windows 包，需检测）
          if [ ! -s /tmp/ossutilbin ]; then
            echo "Direct binary failed, falling back to zip"
            curl -fsSL -o /tmp/ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64.zip
            unzip -q /tmp/ossutil.zip -d /tmp/ossutil
            echo "=== zip contents ==="
            ls -laR /tmp/ossutil
            # 找一个可执行文件
            BIN=$(find /tmp/ossutil -type f -perm /111 -print -quit || true)
            if [ -z "$BIN" ]; then
              echo "ERROR: no executable found in zip"
              exit 1
            fi
            # 检测是否为 ELF（Linux），不是就报错
            if ! file "$BIN" | grep -q 'ELF'; then
              echo "ERROR: archive contains non-ELF (likely Windows) binary: $BIN"
              file "$BIN"
              exit 1
            fi
            sudo mv "$BIN" /usr/local/bin/ossutil
          else
            sudo mv /tmp/ossutilbin /usr/local/bin/ossutil
          fi

          sudo chmod +x /usr/local/bin/ossutil
          file /usr/local/bin/ossutil
          /usr/local/bin/ossutil help | head -5

      - name: Clean OSS remote prefix
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil rm -rf oss://theboe/main/ \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com

      - name: Upload hashed assets to OSS (immutable cache)
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil cp -rf --update dist/ oss://theboe/main/ \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com \
            --exclude "index.html" \
            --meta "Cache-Control:max-age=31536000,immutable"

      - name: Upload index.html to OSS (no-cache)
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil cp -rf --update dist/index.html oss://theboe/main/index.html \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com \
            --meta "Cache-Control:no-cache,max-age=0"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync index.html to ECS
        run: |
          scp -i ~/.ssh/id_ed25519 dist/index.html "$SSH_USER@$SSH_HOST:/root/nginx/html/main/index.html"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Refresh Alibaba Cloud CDN (index.html)
        # 复用 OSS 的 AccessKey 调用 CDN RefreshObjectCaches API（RPC V1 签名）。
        # 若该 AK 无 CDN 权限会失败，但不阻断已完成的 OSS/ECS 部署（continue-on-error）。
        # 失败后改用专用 CDN 子账号 AK：新增 CDN_KEY_ID/CDN_KEY_SECRET 两个 secret 并替换下方引用。
        continue-on-error: true
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
          CDN_URL: https://lianlab.top/index.html
        run: |
          set -eu
          if [ -z "$OSS_KEY_ID" ] || [ -z "$OSS_KEY_SECRET" ]; then
            echo "Skip CDN refresh: AccessKey not configured"
            exit 0
          fi

          # 阿里云 RPC API V1：Timestamp ISO8601 UTC，冒号编码为 %3A
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TS_ENC=$(printf '%s' "$TS" | jq -rR @uri)
          NONCE="$RANDOM$RANDOM$(date +%s)"

          api_params="Action=RefreshObjectCaches&Format=JSON&Version=2018-05-10&AccessKeyId=${OSS_KEY_ID}&SignatureMethod=HMAC-SHA1&Timestamp=${TS_ENC}&SignatureVersion=1.0&SignatureNonce=${NONCE}&ObjectPath=${CDN_URL}&ObjectType=File"

          # 待签名串：参数按字典序升序排列后整体 RFC3986 编码
          sorted=$(printf '%s' "$api_params" | tr '&' '\n' | sort | tr '\n' '&' | sed 's/&$//')
          sorted_enc=$(printf '%s' "$sorted" | jq -sRr @uri | sed 's/^"//; s/"$//')
          string_to_sign="GET&%2F&${sorted_enc}"

          # HMAC-SHA1，key = AccessKeySecret + "&"
          signature=$(printf '%s' "$string_to_sign" | openssl dgst -sha1 -hmac "${OSS_KEY_SECRET}&" -binary | base64)
          sig_enc=$(printf '%s' "$signature" | jq -sRr @uri | sed 's/^"//; s/"$//')

          signed_url="https://cdn.aliyuncs.com/?${api_params}&Signature=${sig_enc}"

          echo "Calling CDN RefreshObjectCaches for $CDN_URL ..."
          resp=$(curl -s --max-time 30 "$signed_url")
          echo "Response: $resp"

          # 成功响应含 RefreshTaskId；失败含 Code/Message（如 NoPermission / InvalidAccessKeyId）
          if echo "$resp" | grep -q '"RefreshTaskId"'; then
            echo "CDN refresh submitted OK"
          else
            echo "CDN refresh failed (likely AK lacks CDN permission, or already refreshing same URL too often)"
            exit 1
          fi
