name: Deploy to OSS + ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install ossutil
        run: |
          set -eux
          # 尝试多个已知 Linux 二进制地址（阿里云官方文档公布的稳定路径）
          for URL in \
            "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64" \
            "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64" \
            "https://gosspublic.alicdn.com/ossutil/1.7.17/ossutil64"; do
            echo "Trying $URL"
            if curl -fsSL -o /tmp/ossutilbin "$URL"; then
              echo "OK from: $URL"
              break
            fi
          done

          # 如果直接二进制都失败，回退到 zip（可能是 Windows 包，需检测）
          if [ ! -s /tmp/ossutilbin ]; then
            echo "Direct binary failed, falling back to zip"
            curl -fsSL -o /tmp/ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64.zip
            unzip -q /tmp/ossutil.zip -d /tmp/ossutil
            echo "=== zip contents ==="
            ls -laR /tmp/ossutil
            # 找一个可执行文件
            BIN=$(find /tmp/ossutil -type f -perm /111 -print -quit || true)
            if [ -z "$BIN" ]; then
              echo "ERROR: no executable found in zip"
              exit 1
            fi
            # 检测是否为 ELF（Linux），不是就报错
            if ! file "$BIN" | grep -q 'ELF'; then
              echo "ERROR: archive contains non-ELF (likely Windows) binary: $BIN"
              file "$BIN"
              exit 1
            fi
            sudo mv "$BIN" /usr/local/bin/ossutil
          else
            sudo mv /tmp/ossutilbin /usr/local/bin/ossutil
          fi

          sudo chmod +x /usr/local/bin/ossutil
          file /usr/local/bin/ossutil
          /usr/local/bin/ossutil help | head -5

      - name: Clean OSS remote prefix
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil rm -rf oss://theboe/main/ \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com

      - name: Gzip static assets (js/css/svg)
        # 预压缩 js/css/svg，上传时带 Content-Encoding:gzip，
        # OSS 不支持自动 gzip，预压缩可让传输体积降至 ~1/3。
        # 注意：woff2/jpg/png 等已是压缩格式，不可 gzip，故分两批上传。
        run: |
          set -eux
          find dist -type f \( -name "*.js" -o -name "*.css" -o -name "*.svg" \) -print0 \
            | while IFS= read -r -d '' f; do
                gzip -9 -c "$f" > "$f.gz"
                mv "$f.gz" "$f"
              done
          echo "=== gzipped js sizes (top 10) ==="
          find dist/assets -type f -name "*.js" -printf "%s %p\n" | sort -rn | head -10

      - name: Upload gzipped assets to OSS (js/css/svg with Content-Encoding)
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil cp -rf --update dist/ oss://theboe/main/ \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com \
            --include "*.js" --include "*.css" --include "*.svg" \
            --exclude "index.html" \
            --meta "Cache-Control:max-age=31536000,immutable" \
            --meta "Content-Encoding:gzip"

      - name: Upload other assets to OSS (fonts/imgs, no gzip)
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil cp -rf --update dist/ oss://theboe/main/ \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com \
            --exclude "*.js" --exclude "*.css" --exclude "*.svg" --exclude "index.html" \
            --meta "Cache-Control:max-age=31536000,immutable"

      - name: Upload index.html to OSS (no-cache)
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          ossutil cp -rf --update dist/index.html oss://theboe/main/index.html \
            -i "$OSS_KEY_ID" \
            -k "$OSS_KEY_SECRET" \
            -e oss-cn-beijing.aliyuncs.com \
            --meta "Cache-Control:no-cache,max-age=0"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync index.html to ECS
        run: |
          scp -i ~/.ssh/id_ed25519 dist/index.html "$SSH_USER@$SSH_HOST:/root/nginx/html/main/index.html"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Refresh Alibaba Cloud CDN (index.html)
        # 复用 OSS 的 AccessKey 调用 CDN RefreshObjectCaches API（阿里云 RPC V1 签名）。
        # 签名逻辑见 scripts/cdn_refresh.py。同时刷新 / 和 /index.html——
        # CDN 视二者为独立缓存 key，nginx try_files 兜底使内容相同但 key 不同。
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
          CDN_URL: "https://lianlab.top/\nhttps://lianlab.top/index.html"
        run: |
          resp=$(python3 scripts/cdn_refresh.py)
          echo "$resp"
          echo "### CDN Refresh Response" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$resp" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$resp" | grep -q '"RefreshTaskId"' || exit 1
